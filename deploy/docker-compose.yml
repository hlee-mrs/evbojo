# EV보조금 — NAS 배포 스택 (웹서버 + 자동 갱신기)
# 사용법: 이 폴더(deploy)가 아니라 프로젝트 루트에서
#   docker compose -f deploy/docker-compose.yml up -d
services:

  web:
    image: nginx:1.27-alpine
    container_name: evbojo-web
    restart: unless-stopped
    ports:
      - "8080:80"            # NAS에서 비어있는 포트로 조정 가능
    volumes:
      - ../site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./security.conf:/etc/nginx/conf.d/security.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/data/meta.json"]
      interval: 60s
      timeout: 5s
      retries: 3
    # 과부하가 나도 NAS 전체가 죽지 않도록 리소스 상한
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  updater:
    image: mcr.microsoft.com/playwright/python:v1.45.0-jammy
    container_name: evbojo-updater
    restart: unless-stopped
    working_dir: /app
    environment:
      - DATA_DIR=/app/site/data
      - TZ=Asia/Seoul
      - STATUS_EVERY_MIN=60      # 접수현황 갱신 주기(분) — 매시간
      - FULL_AT_HOUR=4           # 단가 전체 재수집 시각(매일 KST 4시)
      - PAGE_DELAY=1.2
    volumes:
      - ../site:/app/site
      - ../updater:/app/updater
    entrypoint: ["bash", "/app/updater/entrypoint.sh"]
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1024M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
