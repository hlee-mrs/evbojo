# EV보조금 nginx 설정 — 정적 서빙 + 과부하 방어
# (컨텍스트: 이 파일은 conf.d/default.conf 로 마운트됨.
#  limit_*_zone 지시어는 http 컨텍스트 전용이라 별도 파일(security.conf)에서 선언되어
#  docker-compose 가 /etc/nginx/conf.d/security.conf 로 함께 마운트한다)

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── 과부하 방어 ──────────────────────────────
    # 페이지 요청: IP당 초당 10회(버스트 30) — 사람은 안 걸리고 스크래퍼만 걸림
    limit_req zone=req_per_ip burst=30 nodelay;
    # IP당 동시 연결 20개
    limit_conn conn_per_ip 20;
    limit_req_status 429;
    limit_conn_status 429;

    # 슬로우로리스(연결 고갈) 방어 — 타임아웃 짧게
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          10s;
    keepalive_timeout     15s;
    # 정적 사이트에 큰 요청 본문이 올 일 없음
    client_max_body_size  16k;
    large_client_header_buffers 2 4k;

    # 버전 노출 금지
    server_tokens off;

    # 악성/무의미 메서드 차단 (정적 사이트는 GET/HEAD만)
    if ($request_method !~ ^(GET|HEAD)$) { return 405; }

    # 공격성 스캐너 UA 차단 (검색엔진 봇은 통과)
    if ($http_user_agent ~* (masscan|nmap|sqlmap|nikto|dirbuster|wpscan|acunetix)) { return 403; }

    # 존재할 리 없는 경로 조기 차단 (워드프레스/PHP 스캔 소음 감소)
    location ~* \.(php|asp|aspx|jsp|cgi|env)$ { return 404; }
    location ~* ^/(wp-admin|wp-login|wp-content|xmlrpc\.php|\.git|\.env) { return 404; }

    # ── 압축/캐시 ──────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location /data/ {
        expires 10m;
        add_header Cache-Control "public, must-revalidate";
        # 데이터 핫링크(타 사이트가 우리 JSON 직접 소비) 방지 — 자기 origin과 직접 접근만 허용
        valid_referers none blocked server_names ~\.github\.io evbojo.co.kr evbojo.kr www.evbojo.co.kr;
        if ($invalid_referer) { return 403; }
    }
    location = /sitemap.xml { expires 1d; }
    location = /robots.txt  { expires 1d; }

    # ── 보안 헤더 ──────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP — AdSense/애드핏 게재를 고려한 완화형. 광고 미사용 시 script-src에서 광고 도메인 제거 가능.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://*.adtrafficquality.google https://t1.daumcdn.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-src https://googleads.g.doubleclick.net https://*.googlesyndication.com https://*.daum.net; connect-src 'self' https://*.google.com https://*.googlesyndication.com https://*.adtrafficquality.google; base-uri 'self'; form-action 'self'" always;
    # HSTS는 HTTPS(Cloudflare/인증서) 연결이 안정된 뒤 주석 해제
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    error_page 404 /404.html;
    error_page 429 /429.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # 헬스체크(도커)용 — 로그 소음 제거
    location = /data/meta.json {
        access_log off;
        expires 10m;
    }
}
